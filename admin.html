<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Espace Gency — Gency Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

<!-- ÉCRAN DE CONNEXION -->
<div id="login-screen" class="login-screen">
  <form id="login-form" class="login-card">
    <img src="assets/logo.png" alt="Gency Store" class="login-card__logo">
    <h1 class="login-card__title">Espace Gency</h1>
    <p class="login-card__sub">Accès réservé</p>
    <input type="password" id="password-input" placeholder="Mot de passe" required autofocus>
    <button type="submit" class="btn btn--primary" style="width:100%;">Entrer</button>
    <p id="login-error" class="login-card__error"></p>
  </form>
</div>

<!-- ESPACE ADMIN -->
<div id="admin-screen" class="admin-screen">
  <header class="admin-header">
    <div class="admin-header__brand">
      <img src="assets/logo.png" alt="Gency Store" class="admin-header__logo">
      <span>Espace Gency</span>
    </div>
    <div>
      <a href="index.html" target="_blank" class="admin-header__link">Voir le site</a>
      <button id="logout-btn" class="admin-header__link admin-header__logout">Déconnexion</button>
    </div>
  </header>

  <main class="admin-main">

    <!-- ARTICLES -->
    <section class="admin-section" id="articles">
      <h2 class="admin-section__title">Articles</h2>

      <form id="piece-form" class="admin-form">
        <h3 id="piece-form-title">Ajouter un article</h3>

        <div class="admin-field">
          <label>Nom de l'article</label>
          <input type="text" id="piece-nom" required placeholder="Ex : Robe longue fendue">
        </div>

        <div class="admin-field-row">
          <div class="admin-field">
            <label>Prix (FCFA)</label>
            <input type="number" id="piece-prix" required min="0">
          </div>
          <div class="admin-field">
            <label>Stock (quantité disponible)</label>
            <input type="number" id="piece-stock" required min="0" value="1">
          </div>
        </div>

        <div class="admin-field">
          <label>Catégorie</label>
          <select id="piece-categorie" required></select>
        </div>

        <div class="admin-field">
          <label>Description</label>
          <textarea id="piece-description" rows="3" placeholder="État, matière, coupe..."></textarea>
        </div>

        <div class="admin-field-row">
          <div class="admin-field">
            <label>Tailles (séparées par une virgule)</label>
            <input type="text" id="piece-tailles" placeholder="S, M, L">
          </div>
          <div class="admin-field">
            <label>Couleurs (séparées par une virgule)</label>
            <input type="text" id="piece-couleurs" placeholder="Rose, Noir">
          </div>
        </div>

        <div class="admin-field">
          <label>Photos</label>
          <input type="file" id="piece-photos-input" accept="image/*" multiple>
        </div>
        <div class="admin-field">
          <label>Vidéo (optionnelle)</label>
          <input type="file" id="piece-video-input" accept="video/*">
        </div>
        <p id="upload-status" class="admin-upload-status"></p>
        <div id="media-preview" class="media-preview"></div>

        <div class="admin-form__actions">
          <button type="submit" class="btn btn--primary">Enregistrer l'article</button>
          <button type="button" id="piece-form-cancel" class="btn btn--ghost">Annuler / nouveau</button>
        </div>
      </form>

      <h3 class="admin-list__title">Articles existants</h3>
      <div id="pieces-admin-list" class="admin-list"></div>
    </section>

    <hr class="rule">

    <!-- CATEGORIES -->
    <section class="admin-section" id="cats">
      <h2 class="admin-section__title">Catégories</h2>
      <form id="category-form" class="admin-form admin-form--inline">
        <input type="text" id="cat-nom" placeholder="Nom (ex : Robes)" required>
        <input type="text" id="cat-desc" placeholder="Description courte (optionnel)">
        <button type="submit" class="btn btn--primary">Ajouter</button>
      </form>
      <div id="categories-admin-list" class="admin-list"></div>
    </section>

    <hr class="rule">

    <!-- ARRIVAGES -->
    <section class="admin-section" id="arrivages-admin">
      <h2 class="admin-section__title">Journal des arrivages</h2>
      <form id="arrivage-form" class="admin-form admin-form--inline">
        <input type="text" id="arr-num" placeholder="N° (ex : 04)" required style="max-width:90px;">
        <input type="text" id="arr-nom" placeholder="Nom (ex : Robes d'été)" required>
        <input type="text" id="arr-date" placeholder="Date (optionnel)">
        <button type="submit" class="btn btn--primary">Ajouter</button>
      </form>
      <div id="arrivages-admin-list" class="admin-list"></div>
    </section>

  </main>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="js/firebase-init.js"></script>
<script src="js/data.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
